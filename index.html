<!DOCTYPE html>
<html lang="en">
<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4a90e2">

<meta charset="utf-8" />
<title>🚘Transport Dashboard</title>

<!-- DataTables CSS -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<link rel="stylesheet" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

<style>
:root{
  --bg:#f4f7fa; --card:#fff; --text:#222; --muted:#666;
  --primary:#008cba; --accent:#00bcd4; --glass: rgba(255,255,255,0.6);
}
:root.dark{
  --bg:#0f1720; --card:#0b1220; --text:#e6eef6; --muted:#9fb0c4;
  --primary:#0ea5b7; --accent:#22d3ee; --glass: rgba(15,23,32,0.6);
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter, "Segoe UI", Arial, sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 80px 14px 90px; /* ⬅️ left se 80px andar */
  background: linear-gradient(90deg, var(--primary), var(--accent));
  color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

/* Title + Subtitle on one line */
.header-left {
  display: flex;
  align-items: baseline;
  gap: 10px; /* Title & subtitle ke beech space */
}

#dashboardTitle {
  color: #ffffff;
  font-size: 22px;
  font-weight: 700;
  text-shadow: 0 1px 4px rgba(0,0,0,0.25);
}

#dashboardSubtitle {
  color: #d1faff;
  font-weight: 500;
  font-size: 15px;
  opacity: 0.9;
}

/* Right side buttons */
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-right: 15px; /* thoda andar right side */
}

.switch {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--glass);
  padding: 6px 12px;
  border-radius: 999px;
  color: #fff;
  font-weight: 700;
}

.btn {
  border: none;
  padding: 8px 14px;
  border-radius: 10px;
  background: #fff;
  color: var(--primary);
  cursor: pointer;
  font-weight: 700;
  box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  transition: all 0.2s ease;
}
.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.12);
}



.header-left{display:flex;align-items:center;gap:12px}
.header-title{display:flex;flex-direction:column}
.header-sub{font-size:12px;opacity:0.95}
.header-actions{display:flex;align-items:center;gap:10px}

/* Toggle */
.switch{
  display:inline-flex;align-items:center;gap:8px;background:var(--glass);padding:6px;border-radius:999px;color:#fff;font-weight:700;
}
.btn{
  border:none;padding:8px 12px;border-radius:10px;background:#fff;color:var(--primary);cursor:pointer;font-weight:700;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}
.btn.ghost{background:transparent;color:#fff;box-shadow:none;border:1px solid rgba(255,255,255,0.08)}

/* Container */
.container{max-width:1200px;margin:18px auto;padding:12px}

/* Tabs + search */
.tabs-search-container { display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap: wrap; }
.tabs { display:flex; gap:10px; overflow-x:auto;padding-top:4px; }
.tabs button {
  padding: 10px 12px;
  border: none;
  border-radius: 14px;
  background: #e3eaf0;
  cursor: pointer;
  white-space: nowrap;
  font-size: 18px;
  font-weight: 600;
  color: #333;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
}
.tabs button span.emoji { font-size: 28px; display: inline-block; transition: transform 0.3s ease; }
.tabs button:hover { background: #b3d4fc; color: #000; transform: translateY(-3px); }
.tabs button.active { background: linear-gradient(135deg, #008cba, #00bcd4); color: #fff; font-size: 24px; font-weight: 700; box-shadow: 0 6px 16px rgba(0,0,0,0.2); }
.tabs button.active span.emoji { transform: scale(1.3); }
.tabs::-webkit-scrollbar { display:none; }
.search-box{display:flex;gap:8px;align-items:center}
.search-box input{padding:10px 14px;border-radius:14px;border:2px solid var(--primary);width:200px;font-weight:700}

/* Card view toggle */
.controls{display:flex;gap:8px;align-items:center}

/* Tab content area */
.tab-content{display:none;background:var(--card);padding:12px;border-radius:10px;box-shadow:0 6px 24px rgba(2,6,23,0.06);min-height:220px;opacity:0;transform:translateY(6px);transition:opacity .28s ease,transform .28s ease}
.tab-content.active{display:block;opacity:1;transform:none}

/* spinner / placeholder */
.placeholder{display:flex;align-items:center;justify-content:center;padding:36px;color:var(--muted)}
.spinner{width:36px;height:36px;border-radius:50%;border:4px solid rgba(0,0,0,0.08);border-top-color:var(--primary);animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Table tweaks */
table.dataTable{width:100%!important;background:transparent}
table.dataTable thead th{background:transparent;position:relative}
table.dataTable tbody tr:hover{background:rgba(0,140,186,0.06)}
.normal-route{background:#dff3ff}
.hilly-route{background:#e9ffec}
.dataTables_wrapper .dataTables_filter input{border-radius:8px;padding:6px 10px}

/* small screens: card list */
.card-list{display:none;gap:10px}
.card{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:10px;padding:10px;border:1px solid rgba(0,0,0,0.04)}
.card h4{margin:0 0 6px 0;font-size:15px}
.card p{margin:0;color:var(--muted);font-size:13px}

/* responsive */
@media (max-width:760px){
  table.dataTable {
    display: block !important;
    width: 100% !important;
    overflow-x: auto;
  }
  .card-list { display: none !important; }
}

/* small animation for table rows when updated */
.row-flash{animation:flash .9s ease}
@keyframes flash{0%{background:rgba(255,241,204,0.95)}100%{background:transparent}}

</style>
</head>
<body>

<header>
  <div class="header-left">
    <div id="dashboardTitle" style="font-size:24px">📊 Transport Dashboard</div>
    <div class="header-sub" id="dashboardSubtitle" style="opacity:0.9;font-size:16px">Loading ...</div>
  </div>
  <div class="header-actions">
    <div class="switch" id="modeToggle" title="Toggle Dark / Light">🌙<span id="modeLabel">Dark</span></div>
    <button class="btn" id="cardToggle" title="Toggle Card View (mobile)">Card View</button>
  </div>
</header>

<div class="container">
  <div class="tabs-search-container">
    <div class="tabs" id="tabsContainer"></div>
    <div class="controls">
      <div class="search-box" id="searchBox">
        <input type="text" id="searchFrom" placeholder="🔎 FROM">
        <input type="text" id="searchTo" placeholder="🔎 TO">
      </div>
    </div>
  </div>
  <div id="tabsContent"></div>
</div>

<!-- JS libs -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/responsive/2.5.0/js/dataTables.responsive.min.js"></script>

<script>
/* ========= 1️⃣ LOAD SETTINGS FROM GOOGLE SHEET ========= */
const SETTINGS_SHEET_ID = "1-rBhct0Xohot_KX6bL4M9TQJ8QpzmtzEUexW4xHn2GI"; // fixed to access 'Settings'
const SETTINGS_URL = `https://opensheet.elk.sh/${SETTINGS_SHEET_ID}/Settings`;

let CONFIG = {
  SHEET_ID: "",
  SHEETS: [],
  TITLE: "📊 Transport Dashboard",
  SUBTITLE: "Freight Dashboard",
  CACHE_DURATION: 900000,
  DEFAULT_MODE: "dark",
  ICONS: {},
  PAGE_LENGTH: 10   // default fallback
};


async function loadSettings() {
  try {
    const res = await fetch(SETTINGS_URL);
    const data = await res.json();
    data.forEach(row => {
      if (!row.Key || !row.Value) return;
      if (row.Key.startsWith("ICON_")) CONFIG.ICONS[row.Key.replace("ICON_", "")] = row.Value;
      else if (row.Key === "SHEETS") CONFIG.SHEETS = row.Value.split(",").map(x=>x.trim()).filter(Boolean);
      else CONFIG[row.Key] = row.Value;
    });
    console.log("✅ Settings loaded:", CONFIG);
    applySettings();
  } catch (e) {
    console.error("⚠ Settings load failed", e);
    document.getElementById("dashboardSubtitle").textContent = "⚠ Settings not found";
  }
}

function applySettings(){
  document.getElementById("dashboardTitle").textContent = CONFIG.TITLE || "📊 Dashboard";
  document.getElementById("dashboardSubtitle").textContent = CONFIG.SUBTITLE || "";
  if(CONFIG.DEFAULT_MODE === "light") document.documentElement.classList.remove("dark");
}

loadSettings();
</script>
<!-- ===== Part 2: Original JS logic (unchanged behavior) ===== -->
<script>
/* ===== derive data sheet id and helpers from CONFIG ===== */
const DATA_SHEET_ID = CONFIG.SHEET_ID && CONFIG.SHEET_ID.trim() ? CONFIG.SHEET_ID.trim() : SETTINGS_SHEET_ID;
const OPEN_SHEET_BASE = (sheetName) => `https://opensheet.elk.sh/${DATA_SHEET_ID}/${encodeURIComponent(sheetName)}`;
let CACHE_TTL_MS = parseInt(CONFIG.CACHE_DURATION || 900000);
const FETCH_TIMEOUT_MS = 12000; // small internal constant

/* ===== State ===== */
let highlightThreshold = {};
let tables = {}; // DataTable instances keyed by tabId
let rawDataCache = {}; // Raw JSON data keyed by sheetName
let currentTab = null;
let useCardView = false;

let userActive = true;
let lastActivity = Date.now();

['click','mousemove','keydown','scroll','touchstart'].forEach(evt=>{
  window.addEventListener(evt, ()=> {
    userActive = true;
    lastActivity = Date.now();
  });
});

/* ===== Helpers ===== */
const now = ()=> Date.now();
const cacheKey = (sheetName) => `sheet_cache__${sheetName}`;
function saveToCache(sheetName, data){ try{ localStorage.setItem(cacheKey(sheetName), JSON.stringify({ts: now(), data})); }catch(e){ console.warn('cache save failed', e); } }
function loadFromCache(sheetName){ try{ const raw = localStorage.getItem(cacheKey(sheetName)); if(!raw) return null; const obj = JSON.parse(raw); if(!obj.ts || !obj.data) return null; if(now() - obj.ts > CACHE_TTL_MS) return null; return obj.data; }catch(e){ return null; } }

function timeoutFetch(url, opts={}, timeout=FETCH_TIMEOUT_MS){ const controller = new AbortController(); const id = setTimeout(()=> controller.abort(), timeout); return fetch(url, {...opts, signal: controller.signal}).finally(()=> clearTimeout(id)); }

function debounce(fn, wait=250){ let t; return (...args)=>{ clearTimeout(t); t = setTimeout(()=> fn(...args), wait); } }

/* ====== Thresholds (optional sheet) ====== */
async function loadThresholds(){ try{
  const res = await timeoutFetch(OPEN_SHEET_BASE('Threshold'));
  const d = await res.json(); if(Array.isArray(d)) d.forEach(x=>{ if(x.Type && x.Threshold) highlightThreshold[x.Type.toLowerCase()] = parseFloat(x.Threshold)||0; });
}catch(e){ console.info('Thresholds not loaded or missing'); }
}

/* ====== Utilities ====== */
function normalizeRows(arr){
  if(!arr || !arr.length) return { rows: [], keys: [] };

  const keys = Object.keys(arr[0]).filter(k => k && k.trim() !== "");

  const rows = arr.map(row => {
    const obj = {};
    keys.forEach(k => obj[k] = row[k] ?? "");
    return obj;
  });

  return { rows, keys };
}

function buildGenericTable($table, data, sheetName){

  const { rows, keys } = normalizeRows(data);
  const tableId = $table.attr("id");

  // ✅ LAST COLUMN (Remark / WK / etc.)
  const lastColKey = keys[keys.length - 1];

  // ✅ PRIORITY FLAG
  const enhanced = rows.map(r => ({
    ...r,
    __priority: String(r[lastColKey] || "").trim() !== "" ? 1 : 0
  }));

  // ✅ NORMAL COLUMNS (ALL VISIBLE)
  const cols = keys.map(k => ({
    title: k,
    data: k,
    visible: true
  }));

  if ($.fn.DataTable.isDataTable($table)) {
    $table.DataTable().clear().destroy();
  }
  $table.empty();

  const dt = $table.DataTable({
  deferRender: true,
  processing: true,

    data: enhanced,

    columns: [
      { data: "__priority", visible: false }, // helper column
      ...cols
    ],

    ordering: true,
    orderMulti: false,

    // 🔥🔥 FIX: PRIORITY ROWS ALWAYS ON TOP
    orderFixed: {
      pre: [[0, "desc"]]
    },

    // normal sorting (FROM column)
    order: [[1, "asc"]],

   pageLength: parseInt(CONFIG.PAGE_LENGTH) || 10,

    responsive: true,
 autoWidth: true,
 createdRow: function(row, rowData){
  if(rowData.__priority === 1){
    $(row).css({
      background: "#ffe6e6",
      fontWeight: "500",
      fontSize: "14px"   // 👈 yaha font size set karo
    });
  }
},


    initComplete: function(){
      tables[tableId] = this.api();
    }
  });

  rawDataCache[sheetName] = rows;
  return dt;
}

async function fastReload(sheetName){

  const tabId = 'table_' + sheetName.toLowerCase();
  const table = tables[tabId];
  if(!table) return;

  try{
    const res = await timeoutFetch(
      OPEN_SHEET_BASE(sheetName) + '?_=' + Date.now()
    );
    const data = await res.json();
    if(!Array.isArray(data)) return;

    const { rows, keys } = normalizeRows(data);
    const lastKey = keys[keys.length - 1];

    // auto detect time column
    const timeKey = keys.find(k =>
      k.toLowerCase().includes('update') ||
      k.toLowerCase().includes('time') ||
      k.toLowerCase().includes('date')
    );

    const enhanced = rows.map(r => ({
      ...r,
      __priority: String(r[lastKey] || '').trim() !== '' ? 1 : 0,
      __updated: timeKey && r[timeKey]
        ? new Date(r[timeKey]).getTime() || 0
        : 0
    }));

    // 🔥 FAST swap (no destroy)
    table.rows().invalidate();     // existing DOM reuse
table.clear();                 // data clear (DOM nahi todta)
table.rows.add(enhanced);      // naya data add
table.columns.adjust();        // layout fix
table.draw(false);             // light redraw
table.settings()[0]._drawHold = true; // extra redraw rok


    // optional flash
 

    rawDataCache[sheetName] = rows;
    saveToCache(sheetName, rows);

  }catch(e){
    console.warn('Live reload failed:', sheetName, e);
  }
}



function buildCalculationTable($table, data, sheetName){ const { rows, keys } = normalizeRows(data);
  if(keys.length === 0){ $table.html('<div class="placeholder">⚠ Calculation sheet empty</div>'); return; }
  if($.fn.DataTable.isDataTable($table)) try{$table.DataTable().destroy();}catch(e){}
  $table.empty();

  // custom thead grouping
  const normalKeys = keys.slice(0,4);
  const hillyKeys = keys.slice(4,8);
  const $thead = $('<thead/>');
  $thead.append(`<tr><th class="normal-route" colspan="${normalKeys.length}">Normal Route</th><th class="hilly-route" colspan="${hillyKeys.length}">Hilly / Ghat Route</th></tr>`);
  const headerRow = $('<tr/>');
  normalKeys.forEach(k=> headerRow.append(`<th class="normal-route">${k}</th>`));
  hillyKeys.forEach(k=> headerRow.append(`<th class="hilly-route">${k}</th>`));
  $thead.append(headerRow); $table.append($thead);

  const dt = $table.DataTable({ data: rows, columns: keys.map(k=>({ title:k, data:k })), destroy:true, responsive:true, pageLength:15, order:[[5,'asc']], createdRow: function(row){ $(row).find('td:lt(4)').addClass('normal-route'); $(row).find('td:gt(3)').addClass('hilly-route'); }, initComplete: function(){ tables[$table.attr('id')] = this.api(); } });
  rawDataCache[sheetName] = rows; return dt;
}

/* ====== Cards (mobile) ====== */
function renderCardsForSheet(sheetName){ const data = rawDataCache[sheetName]; const container = document.getElementById(''+ 'table_' + sheetName.toLowerCase() + '_cards'.replace('table_','').replace('_cards','') ) ; 
  // Note: original id for cards earlier was '#<tabId>_cards' where tabId = 'table_'+name.toLowerCase()
  // We'll compute correct id:
  const cardContainer = document.getElementById('table_' + sheetName.toLowerCase() + '_cards');
  if(!cardContainer) return;
  const containerEl = cardContainer;
  containerEl.innerHTML = '';
  if(!data || !data.length){ containerEl.innerHTML = '<div class="placeholder">No data for card view</div>'; return; }
  const keys = Object.keys(data[0]); data.forEach(row=>{ const c = document.createElement('div'); c.className='card'; const titleKey = keys[0]||''; const html = `<h4>${row[titleKey]?? ''}</h4>` + keys.slice(1,5).map(k=>`<p><strong>${k}:</strong> ${row[k]?? ''}</p>`).join(''); c.innerHTML = html; containerEl.appendChild(c); }); }

/* ====== FROM/TO filter logic (debounced) ====== */
function filterFromTo(){ if(!currentTab || !tables[currentTab]) return; const qFrom = $('#searchFrom').val().trim(); const qTo = $('#searchTo').val().trim(); const dt = tables[currentTab]; const cols = dt.settings().init().columns || []; const idxFrom = cols.findIndex(c=> (c.title||'').toLowerCase().includes('from'));
  const idxTo = cols.findIndex(c=> (c.title||'').toLowerCase().includes('to'));
  dt.columns().search(''); if(idxFrom>=0) dt.column(idxFrom).search(qFrom); if(idxTo>=0) dt.column(idxTo).search(qTo); dt.draw(); }

const debouncedFilter = debounce(filterFromTo, 220);
$('#searchFrom,#searchTo').on('keyup', debouncedFilter);

/* ====== UI skeleton & tab creation ====== */
async function initUI(){
  const tabsContainer = $('#tabsContainer'); const tabsContent = $('#tabsContent');
  let tabNames = [];

  // prefer CONFIG.SHEETS (comma separated). If empty, try Index sheet (backwards compatibility)
  if(CONFIG.SHEETS && Array.isArray(CONFIG.SHEETS) && CONFIG.SHEETS.length > 0){
    tabNames = CONFIG.SHEETS;
  } else {
    try{
      const res = await timeoutFetch(OPEN_SHEET_BASE('Index'));
      const idx = await res.json(); tabNames = Array.isArray(idx) ? idx.map(r=> r.SheetName).filter(Boolean) : [];
    }catch(e){
      console.warn('Index sheet failed — using default set');
      tabNames = ['Calculation','Tanker','Truck','Tempo','Others'];
    }
  }

  // Create tabs and placeholders
  tabNames.forEach((sheetName,i)=>{
    const tabId = 'table_' + sheetName.toLowerCase();
    const emoji = (CONFIG.ICONS && CONFIG.ICONS[sheetName]) || (sheetName==='Calculation'?'🧮':sheetName==='Tanker'?'🚛':sheetName==='Truck'?'🚚':sheetName==='Tempo'?'🛻':'📦');
    tabsContainer.append(`<button class="tab-btn" data-tab="${tabId}"><span class="emoji">${emoji}</span> ${sheetName}</button>`);

    tabsContent.append(`
      <div id="${tabId}_container" class="tab-content" data-sheet="${sheetName}">
        <div id="${tabId}_placeholder" class="placeholder"><div style="text-align:center"><div class="spinner"></div><div style="margin-top:10px;color:var(--muted)">Loading ${sheetName}...</div></div></div>
        <div id="${tabId}_cards" class="card-list" style="margin-bottom:8px;display:none"></div>
        <table id="${tabId}" class="display nowrap" style="width:100%;display:none"></table>
      </div>
    `);
  });

  // activate first tab
  $('.tab-btn').first().addClass('active'); $('.tab-content').first().addClass('active'); currentTab = $('.tab-btn').first().data('tab'); updateSearchBox();

  // tab click handler
$('.tab-btn').on('click', function(){

  $('.tab-btn').removeClass('active');
  $(this).addClass('active');

  $('.tab-content').removeClass('active');

  const tabId = $(this).data('tab');
  $('#' + tabId + '_container').addClass('active');

  currentTab = tabId;

  const sheetName = $('#' + tabId + '_container').data('sheet');

  // ✅ Load only if not already loaded
  if(!rawDataCache[sheetName]){
    loadSheetToDom(sheetName);
  }

  updateSearchBox();
  filterFromTo();
  toggleCardListVisibilityFor(tabId);
});


  // header controls
  document.getElementById('modeToggle').addEventListener('click', function(){ const cur = localStorage.getItem('ui_mode') === 'dark'; setMode(!cur); });
  document.getElementById('cardToggle').addEventListener('click', function(){ useCardView = !useCardView; this.innerHTML = useCardView ? 'Table View' : 'Card View'; toggleCardListsGlobally(); });

  // export CSV (kept simple)
  try{
    document.getElementById('exportCsvBtn')?.addEventListener('click', ()=> exportVisibleTableCsv());
  }catch(e){ /* ignore if not present in this template */ }

  // restore ui mode
  const storedMode = localStorage.getItem('ui_mode') || CONFIG.DEFAULT_MODE || 'dark'; setMode(storedMode === 'dark');

  // start
  await loadThresholds(); // optional
  await parallelLoadSheetsLazy();
}

/* ====== Toggle card lists & visibility ====== */
function toggleCardListVisibilityFor(tabId){ const sheetName = $('#' + tabId + '_container').data('sheet'); const tableEl = $('#' + tabId); const cardContainer = $('#'+tabId+'_cards'); if(window.innerWidth <= 760 && useCardView){ cardContainer.show(); tableEl.hide(); renderCardsForSheet(sheetName); } else { cardContainer.hide(); tableEl.show(); } }
function toggleCardListsGlobally(){ $('.tab-content').each(function(){ const tabId = $(this).attr('id').replace('_container',''); toggleCardListVisibilityFor(tabId); }); }

/* ====== Parallel load with lazy init (only load visible tab immediately, others lazy) ====== */
async function parallelLoadSheetsLazy(){

  const sheetNames = [];
  $('#tabsContent .tab-content').each(function(){
    sheetNames.push($(this).data('sheet'));
  });

  // ✅ Only load first visible tab
  const first = sheetNames[0];
  if(first){
    await loadSheetToDom(first);
  }

  console.log("🚀 Turbo Mode: Only first tab loaded");
  toggleCardListVisibilityFor(currentTab);
}

async function loadSheetToDom(sheetName){ const tabId = 'table_' + sheetName.toLowerCase(); const $placeholder = $('#' + tabId + '_placeholder'); const $table = $('#' + tabId); const cached = loadFromCache(sheetName);
  if(cached){ try{ if(sheetName === 'Calculation'){ buildCalculationTable($table, cached, sheetName); } else { buildGenericTable($table, cached, sheetName); } $table.show(); $placeholder.hide(); renderCardsForSheet(sheetName); }catch(e){ console.warn('cached render failed', e); }
  }

  try{ const res = await timeoutFetch(OPEN_SHEET_BASE(sheetName)); const fresh = await res.json(); const freshStr = JSON.stringify(fresh || []); const cachedStr = JSON.stringify(cached || []);
   if(true){ if(sheetName === 'Calculation'){ buildCalculationTable($table, fresh, sheetName); } else { buildGenericTable($table, fresh, sheetName); } $table.find('tbody tr').addClass('row-flash'); setTimeout(()=> $table.find('tbody tr').removeClass('row-flash'), 1200); renderCardsForSheet(sheetName); saveToCache(sheetName, fresh);
    }
    $table.show(); $placeholder.hide();
  }catch(err){ console.error('fetch failed for', sheetName, err); if(!cached){ $placeholder.html(`<div style="color:var(--muted)">⚠ Unable to load ${sheetName}. Please check network or sheet.</div>`); } else { $table.show(); $placeholder.hide(); } }
}

/* ====== Searchbox show/hide logic ====== */
function updateSearchBox(){ const show = currentTab && (currentTab.includes('tanker') || currentTab.includes('truck') || currentTab.includes('others')); $('#searchBox').css('display', show ? 'flex' : 'none'); $('#searchFrom,#searchTo').val(''); }

/* ====== Mode switch ====== */
function setMode(dark){ if(dark){ document.documentElement.classList.add('dark'); localStorage.setItem('ui_mode','dark'); document.getElementById('modeLabel').textContent='Dark'; } else { document.documentElement.classList.remove('dark'); localStorage.setItem('ui_mode','light'); document.getElementById('modeLabel').textContent='Light'; } }

/* ====== CSV export (simple) ====== */
function exportVisibleTableCsv(){ if(!currentTab || !tables[currentTab]) return alert('No table visible to export'); const dt = tables[currentTab]; const data = dt.rows({search:'applied'}).data().toArray(); if(!data.length) return alert('No rows to export'); const keys = Object.keys(data[0]).filter(k=> !k.startsWith('__'));
  const csv = [keys.join(','), ...data.map(r=> keys.map(k=> `"${String(r[k] ?? '').replace(/"/g,'""')}"`).join(','))].join('\n'); const blob = new Blob([csv], {type:'text/csv'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${currentTab.replace('table_','')}_export.csv`; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }

const LIVE_REFRESH_MS = 10000; // 10 sec – smooth & safe

setInterval(() => {

  if(!currentTab) return;

  const sheetName = $('#' + currentTab + '_container').data('sheet');

  if(sheetName){
    fastReload(sheetName);
  }

}, LIVE_REFRESH_MS);
